name: CI - Build

on:
  pull_request:
    branches:
       - main

  workflow_dispatch: #Permite ejecucion manual desde github actions
       inputs:
          build_configuration:
             description: 'Build configuration (Debug or Release)'
             required: false
             default: 'Release'
             type: choice
             options:
                - Debug
                - Release
          log_level: 
             description: 'dotnet verbosity level'
             required: false
             default: 'normal'
             type: choice
             options:
                - quiet
                - minimal
                - normal
                - detailed

env:
  DOTNET_VERSION: '10.0.102'
  BUILD_CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Mensaje Inicial
        run: echo "Iniciando workflow de CI"

      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Dependencias
        run: dotnet restore src/Api/Api.csproj --verbosity ${{ env.log_level  || 'normal' }}

      - name: Build del proyecto 
        run: |
            CONFIG=${{inputs.build_configuration || 'Release'}}
            echo "Build with configuration: $CONFIG" 
            dotnet build src/Api/Api.csproj --configuration $CONFIG --no-restore
